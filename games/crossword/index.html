            width: 100%;
        }
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header h1 {
            font-size: 20px;
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        .btn-submit { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102,126,234,0.4); }
        .btn-reset { background: #f5f5f5; color: #666; }
        .btn-reset:hover { background: #e0e0e0; }
        .btn-refresh { background: #4ecdc4; color: white; }
        .btn-refresh:hover { background: #45b7aa; }
        .btn-hint { background: #ff9f43; color: white; }
        .btn-hint:hover { background: #f08c00; }
        .game-board {
            display: inline-grid;
            gap: 2px;
            justify-content: center;
            margin: 15px auto;
            background: #e8e8e8;
            padding: 4px;
            border-radius: 8px;
        }
        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            font-weight: bold;
        }
        .cell-empty { background: #e8e8e8; }
        .cell-input {
            background: #fff;
            border: 2px solid #ddd;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cell-input:hover { border-color: #667eea; }
        .cell-input.active {
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102,126,234,0.4);
            background: #f0f4ff;
        }
        .cell-input input {
            width: 100%;
            height: 100%;
            border: none;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            outline: none;
            background: transparent;
        }
        .cell-correct { background: #d4edda !important; border-color: #28a745 !important; }
        .cell-wrong { background: #ffe0e0 !important; border-color: #dc3545 !important; }
        .cell-highlight { background: #fff3cd !important; border-color: #ffc107 !important; }
        .number {
            position: absolute;
            top: 1px;
            left: 2px;
            font-size: 10px;
            color: #667eea;
            font-weight: bold;
            z-index: 1;
        }
        .clues { background: #f9f9f9; border-radius: 12px; padding: 10px; margin-top: 5px; }
        .clues h3 {
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        .clue-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 10px;
        }
        .clue-item {
            padding: 10px 14px;
            background: white;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .clue-item:hover { transform: translateX(4px); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .clue-item .dir {
            display: inline-block;
            padding: 2px 8px;
            background: #667eea;
            color: white;
            border-radius: 4px;
            font-size: 11px;
            margin-right: 5px;
        }
        .clue-item .num { color: #667eea; font-weight: bold; margin-right: 3px; }
        .message {
            text-align: center;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            display: none;
            font-size: 16px;
        }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .message.info { background: #d1ecf1; color: #0c5460; display: block; }
        .stats { text-align: center; color: #888; font-size: 13px; }
        @media (max-width: 768px) {
            .clue-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

</div>

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function canPlace(grid, word, row, col, dir) {
    const chars = [...word];
    let hasCrossing = false;
    for (let i = 0; i < chars.length; i++) {
        const r = dir === 'h' ? row : row + i;
        const c = dir === 'h' ? col + i : col;
        if (r < 0 || r >= GRID || c < 0 || c >= GRID) return false;
        if (grid[r][c] && grid[r][c] !== '') {
            if (grid[r][c] !== chars[i]) return false;
            hasCrossing = true;
        }
    }
    if (!hasCrossing) return false;
    
    for (let i = 0; i < chars.length; i++) {
        const r = dir === 'h' ? row : row + i;
        const c = dir === 'h' ? col + i : col;
        const isCrossing = grid[r][c] === chars[i];
        if (dir === 'h') {
            if (!isCrossing && r > 0 && grid[r-1][c]) return false;
            if (!isCrossing && r < GRID-1 && grid[r+1][c]) return false;
            if (i === 0 && c > 0 && grid[r][c-1]) return false;
            if (i === chars.length-1 && c < GRID-1 && grid[r][c+1]) return false;
        } else {
            if (!isCrossing && c > 0 && grid[r][c-1]) return false;
            if (!isCrossing && c < GRID-1 && grid[r][c+1]) return false;
            if (i === 0 && r > 0 && grid[r-1][c]) return false;
            if (i === chars.length-1 && r < GRID-1 && grid[r+1][c]) return false;
        }
    }
    return true;
}

function placeWord(grid, word, row, col, dir) {
    const chars = [...word];
    for (let i = 0; i < chars.length; i++) {
        const r = dir === 'h' ? row : row + i;
        const c = dir === 'h' ? col + i : col;
        grid[r][c] = chars[i];
    }
}

function generateCrossword() {
    let bestResult = null;
    let bestScore = 0;

    for (let attempt = 0; attempt < 15; attempt++) {
        const grid = Array.from({length: GRID}, () => Array(GRID).fill(''));
        const placed = [];
        const shuffled = shuffle([...DB]);

        // Place first word in center
        const first = shuffled[0];
        const firstRow = Math.floor(GRID / 2);
        const firstCol = Math.floor((GRID - first.idiom.length) / 2);
        placeWord(grid, first.idiom, firstRow, firstCol, 'h');
        placed.push({word: first.idiom, clue: first.clue, dir: 'h', row: firstRow, col: firstCol});

        // Try to place more words
        let maxIter = 200;
        for (let wi = 1; wi < shuffled.length && maxIter-- > 0; wi++) {
            const item = shuffled[wi];
            const w = item.idiom;
            let placed_new = false;

            // Try to find a crossing point with existing words
            const existingCells = [];
            for (let r = 0; r < GRID; r++) {
                for (let c = 0; c < GRID; c++) {
                    if (grid[r][c]) existingCells.push({r, c, ch: grid[r][c]});
                }
            }

            // For each char in the new word, try to cross with existing cells
            const charPositions = {};
            for (let i = 0; i < w.length; i++) {
                if (!charPositions[w[i]]) charPositions[w[i]] = [];
                charPositions[w[i]].push(i);
            }

            for (const {r, c, ch} of existingCells) {
                if (charPositions[ch]) {
                    for (const charIdx of charPositions[ch]) {
                        // Try both directions
                        for (const dir of ['h', 'v']) {
                            const startR = dir === 'h' ? r : r - charIdx;
                            const startC = dir === 'h' ? c - charIdx : c;

                            // Check if this word is already placed at this position/direction
                            const alreadyPlaced = placed.some(p =>
                                p.word === w && p.dir === dir && p.row === startR && p.col === startC
                            );
                            if (alreadyPlaced) continue;

                            if (canPlace(grid, w, startR, startC, dir)) {
                                // Also check perpendicular adjacency is OK
                                let ok = true;
                                for (let i = 0; i < w.length; i++) {
                                    const cr = dir === 'h' ? startR : startR + i;
                                    const cc = dir === 'h' ? startC + i : startC;
                                    // Check that perpendicular cells at non-crossing points are empty
                                    if (grid[cr][cc] && grid[cr][cc] !== w[i] && !(cr === r && cc === c)) {
                                        ok = false; break;
                                    }
                                }
                                if (ok) {
                                    placeWord(grid, w, startR, startC, dir);
                                    placed.push({word: w, clue: item.clue, dir, row: startR, col: startC});
                                    placed_new = true;
                                    break;
                                }
                            }
                        }
                        if (placed_new) break;
                    }
                }
                if (placed_new) break;
            }
        }

        if (placed.length > bestScore) {
            bestScore = placed.length;
            bestResult = {grid, placed};
        }
    }

    return bestResult;
}

function buildGridData(result) {
    const {grid, placed} = result;
    const data = Array.from({length: GRID}, () => Array(GRID).fill(null));
    let clueNum = 1;
    const usedNumbers = {};

    // Sort placed words by position for consistent numbering
    placed.sort((a, b) => a.row !== b.row ? a.row - b.row : a.col - b.col);

    for (const p of placed) {
        // Check if this start cell already has a number
        const key = `${p.row}-${p.col}`;
        let num;
        if (usedNumbers[key]) {
            num = usedNumbers[key];
        } else {
            num = clueNum++;
            usedNumbers[key] = num;
        }

        for (let i = 0; i < p.word.length; i++) {
            const r = p.dir === 'h' ? p.row : p.row + i;
            const c = p.dir === 'h' ? p.col + i : p.col;
            if (!data[r][c]) {
                data[r][c] = {char: p.word[i], num: null};
            }
            if (i === 0) {
                data[r][c].num = num;
            }
        }
    }
    return {data, placed};
}

function render(gameData) {
    const {data, placed} = gameData;
    words = placed;

    // Calculate bounds
    let minR = GRID, maxR = 0, minC = GRID, maxC = 0;
    for (let r = 0; r < GRID; r++) {
        for (let c = 0; c < GRID; c++) {
            if (data[r][c]) {
                minR = Math.min(minR, r); maxR = Math.max(maxR, r);
                minC = Math.min(minC, c); maxC = Math.max(maxC, c);
            }
        }
    }

    const rows = maxR - minR + 1;
    const cols = maxC - minC + 1;

    // Responsive cell size
    const containerW = document.querySelector('.container').clientWidth - 60;
    cellPx = Math.min(48, Math.floor((containerW - cols * 2) / cols));
    cellPx = Math.max(30, cellPx);

    const board = document.getElementById('gameBoard');
    board.style.gridTemplateColumns = `repeat(${cols}, ${cellPx}px)`;
    board.style.gridTemplateRows = `repeat(${rows}, ${cellPx}px)`;
    board.innerHTML = '';

    for (let r = minR; r <= maxR; r++) {
        for (let c = minC; c <= maxC; c++) {
            const cell = document.createElement('div');
            cell.className = 'cell';
            cell.dataset.row = r;
            cell.dataset.col = c;

            if (!data[r][c]) {
                cell.classList.add('cell-empty');
            } else {
                cell.classList.add('cell-input');
                if (data[r][c].num) {
                    const numSpan = document.createElement('span');
                    numSpan.className = 'number';
                    numSpan.textContent = data[r][c].num;
                    cell.appendChild(numSpan);
                }
                const input = document.createElement('input');
                input.type = 'text';
                input.maxLength = 1;
                input.dataset.answer = data[r][c].char;
                input.dataset.row = r;
                input.dataset.col = c;
                input.style.fontSize = (cellPx * 0.45) + 'px';
                input.addEventListener('input', onInput);
                input.addEventListener('keydown', onKeyDown);
                input.addEventListener('focus', onFocus);
                input.addEventListener('click', onClick);
                cell.appendChild(input);
            }
            board.appendChild(cell);
        }
    }

    // Render clues
    const container = document.getElementById('cluesContainer');
    container.innerHTML = '';
    const sorted = [...placed].sort((a, b) => {
        const aKey = `${a.row}-${a.col}`;
        const bKey = `${b.row}-${b.col}`;
        const aNum = getClueNum(a.row, a.col, a.dir);
        const bNum = getClueNum(b.row, b.col, b.dir);
        return aNum - bNum;
    });

    const clueNums = {};
    for (const p of sorted) {
        const num = getClueNum(p.row, p.col, p.dir);
        const key = `${num}-${p.dir}`;
        if (clueNums[key]) continue;
        clueNums[key] = true;

        const div = document.createElement('div');
        div.className = 'clue-item';
        div.innerHTML = `<span class="dir">${p.dir === 'h' ? '横' : '竖'}</span><span class="num">${num}.</span><span>${p.clue}</span>`;
        div.addEventListener('click', () => highlightClue(p));
        container.appendChild(div);
    }

    // Stats
    let totalChars = 0;
    for (let r = 0; r < GRID; r++) {
        for (let c = 0; c < GRID; c++) {
            if (data[r][c]) totalChars++;
        }
    }
    document.getElementById('stats').textContent = `共 ${placed.length} 个成语，${totalChars} 个汉字`;
    document.getElementById('message').className = 'message';
    document.getElementById('message').textContent = '';
}

function getClueNum(row, col, dir) {
    const el = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"] .number`);
    return el ? parseInt(el.textContent) : 0;
}

function highlightClue(p) {
    document.querySelectorAll('.cell-input').forEach(c => c.classList.remove('active', 'cell-highlight'));
    for (let i = 0; i < p.word.length; i++) {
        const r = p.dir === 'h' ? p.row : p.row + i;
        const c = p.dir === 'h' ? p.col + i : p.col;
        const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
        if (cell) cell.classList.add('cell-highlight');
    }
    // Focus first input
    const firstInput = document.querySelector(`.cell[data-row="${p.row}"][data-col="${p.col}"] input`);
    if (firstInput) firstInput.focus();
}

function onInput(e) {
    const val = e.target.value;
    if (val.length === 1) {
        e.target.value = val;
        moveToNext(e.target);
    }
}

function moveToNext(input) {
    const row = parseInt(input.dataset.row);
    const col = parseInt(input.dataset.col);
    // Find the word this cell belongs to and move in that direction
    const cell = input.closest('.cell');
    // Try right, then down
    if (focusCell(row, col + 1)) return;
    if (focusCell(row + 1, col)) return;
}

function onKeyDown(e) {
    const row = parseInt(e.target.dataset.row);
    const col = parseInt(e.target.dataset.col);
    switch(e.key) {
        case 'ArrowRight': e.preventDefault(); focusCell(row, col+1); break;
        case 'ArrowLeft': e.preventDefault(); focusCell(row, col-1); break;
        case 'ArrowDown': e.preventDefault(); focusCell(row+1, col); break;
        case 'ArrowUp': e.preventDefault(); focusCell(row-1, col); break;
        case 'Backspace':
            if (!e.target.value) {
                e.preventDefault();
                focusCell(row, col-1) || focusCell(row-1, col);
            }
            break;
    }
}

function showCurrentClue(row, col) {
    const clueEl = document.getElementById('currentClue');
    const foundWords = [];
    
    for (const p of words) {
        for (let i = 0; i < p.word.length; i++) {
            const r = p.dir === 'h' ? p.row : p.row + i;
            const c = p.dir === 'h' ? p.col + i : p.col;
            if (r === row && c === col) {
                foundWords.push(p);
                break;
            }
        }
    }
    
    if (foundWords.length === 0) {
        clueEl.innerHTML = `<span style="color:#aaa;"> 点击格子查看提示</span>`;
        return;
    }
    
    const num = getClueNum(foundWords[0].row, foundWords[0].col, foundWords[0].dir);
    if (foundWords.length === 1) {
        const p = foundWords[0];
        const dirLabel = p.dir === 'h' ? '横' : '竖';
        clueEl.innerHTML = `<span style="color:#667eea;font-weight:bold;">${num} ${dirLabel}</span> &nbsp;${p.clue}`;
    } else {
        // Cell belongs to two words (crossing point)
        const p1 = foundWords[0];
        const p2 = foundWords[1];
        const num1 = getClueNum(p1.row, p1.col, p1.dir);
        const num2 = getClueNum(p2.row, p2.col, p2.dir);
        clueEl.innerHTML = `<span style="color:#667eea;font-weight:bold;">${num1} ${p1.dir==='h'?'横':'竖'}</span> &nbsp;${p1.clue}<br><span style="color:#667eea;font-weight:bold;">${num2} ${p2.dir==='h'?'横':'竖'}</span> &nbsp;${p2.clue}`;
    }
}

function onFocus(e) {
    document.querySelectorAll('.cell-input').forEach(c => c.classList.remove('active'));
    e.target.closest('.cell').classList.add('active');
    const row = parseInt(e.target.dataset.row);
    const col = parseInt(e.target.dataset.col);
    showCurrentClue(row, col);
}

function onClick(e) {
    const cell = e.target.closest('.cell');
    document.querySelectorAll('.cell-input').forEach(c => c.classList.remove('active'));
    cell.classList.add('active');
    const row = parseInt(cell.dataset.row);
    const col = parseInt(cell.dataset.col);
    showCurrentClue(row, col);
}

function focusCell(row, col) {
    const input = document.querySelector(`.cell[data-row="${row}"][data-col="${col}"] input`);
    if (input) { input.focus(); return true; }
    return false;
}

function checkAnswers() {
    const inputs = document.querySelectorAll('.cell-input input');
    let correct = true;
    let filled = 0;
    let total = inputs.length;

    inputs.forEach(input => {
        if (input.value.trim()) filled++;
        if (input.value.trim().toUpperCase() === input.dataset.answer) {
            input.closest('.cell').classList.add('cell-correct');
            input.closest('.cell').classList.remove('cell-wrong');
        } else {
            input.closest('.cell').classList.add('cell-wrong');
            input.closest('.cell').classList.remove('cell-correct');
            correct = false;
        }
    });

    const msg = document.getElementById('message');
    if (filled < total) {
        msg.className = 'message info';
        msg.textContent = `还有空格未填写（${filled}/${total}）`;
    } else if (correct) {
        msg.className = 'message success';
        msg.textContent = '🎉 恭喜你，全部正确！太棒了！';
    } else {
        msg.className = 'message error';
        msg.textContent = '有些答案不对，请检查红色标记的字';
    }
}

function resetGame() {
    document.querySelectorAll('.cell-input input').forEach(input => { input.value = ''; });
    document.querySelectorAll('.cell-input').forEach(c => { c.classList.remove('cell-correct', 'cell-wrong', 'cell-highlight'); });
    document.getElementById('message').className = 'message';
}

function generateNewGame() {
    const result = generateCrossword();
    if (!result || result.placed.length < 3) {
        generateNewGame();
        return;
    }
    const gameData = buildGridData(result);
    render(gameData);
}

function giveHint() {
    const activeCell = document.querySelector('.cell-input.active');
    if (!activeCell) {
        const msg = document.getElementById('message');
        msg.className = 'message info';
        msg.textContent = '请先点击一个格子，再点击提示按钮';
        return;
    }
    const row = parseInt(activeCell.dataset.row);
    const col = parseInt(activeCell.dataset.col);
    const input = activeCell.querySelector('input');
    if (input && input.value.trim()) {
        const msg = document.getElementById('message');
        msg.className = 'message info';
        msg.textContent = '该格子已填写，请选择空格子再提示';
        setTimeout(() => { msg.className = 'message'; }, 2000);
        return;
    }

    // Find which word(s) this cell belongs to
    let targetWord = null;
    for (const p of words) {
        for (let i = 0; i < p.word.length; i++) {
            const r = p.dir === 'h' ? p.row : p.row + i;
            const c = p.dir === 'h' ? p.col + i : p.col;
            if (r === row && c === col) {
                targetWord = p;
                break;
            }
        }
        if (targetWord) break;
    }

    if (!targetWord) {
        const msg = document.getElementById('message');
        msg.className = 'message error';
        msg.textContent = '无法找到对应的成语';
        return;
    }

    // Fill the entire word
    let filledCount = 0;
    for (let i = 0; i < targetWord.word.length; i++) {
        const r = targetWord.dir === 'h' ? targetWord.row : targetWord.row + i;
        const c = targetWord.dir === 'h' ? targetWord.col + i : targetWord.col;
        const cell = document.querySelector(`.cell[data-row="${r}"][data-col="${c}"]`);
        if (cell) {
            const inp = cell.querySelector('input');
            if (inp && !inp.value.trim()) {
                inp.value = targetWord.word[i];
                filledCount++;
                cell.classList.add('cell-highlight');
                setTimeout(() => cell.classList.remove('cell-highlight'), 1500);
            }
        }
    }

    const msg = document.getElementById('message');
    msg.className = 'message success';
    msg.textContent = `💡 已提示成语：${targetWord.word}（${filledCount} 个空格已填充）`;
    setTimeout(() => { msg.className = 'message'; }, 3000);
}

// Initialize
generateNewGame();
