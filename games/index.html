<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的小游戏</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        h1{font-size: 30px;
            color: #6ECC54;
        }
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            gap: 80px;
        }
        #gameContainer, .theGame, .games{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        @media screen and (min-width: 480px) {
            #gameContainer{
                flex-direction: row;
                flex-wrap: wrap;
                gap: 30px;
            }
        }
        .games{
            background: #feddb9;
            border-radius: 20px;
            padding: 5px;
        }
        .theGame{
            gap: 2px;
        }
        .theGame a{
            font-size: 24px;
            font-weight: 800;
            text-decoration: none;
            width: 200px;
            height: 50px;
            background-color: #71E2D1;
            color: #492D22;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .thirdParty a::before{
            position: absolute;
            content: '第三方';
            background-color: #4CAF50;
            border-radius: 10px 10px 0 0;
            font-size: 15px;
            font-weight: 400;
            padding: 0 5px;
            translate: 0 -30px;
        }
    </style>
</head>
<body>
    <h1>欢迎来到我的小游戏</h1>
    <div id="gameContainer">
        <p>手机安装到桌面，可以离线使用</p>
        <div class="games">
            <div class="theGame">
                <a href="bricks/index.html">🧱打砖块</a>
            </div>
            <div class="theGame">
                <a href="minescan/index.html">💣扫雷</a>
            </div>
            <div class="theGame">
                <a href="monopoly/index.html">💰大富翁</a>
            </div>
            <div class="theGame">
                <a href="crossword/index.html">✍️成语填词</a>
            </div>
            <div class="theGame">
                <a href="puzzle/index.html">🧩拼图</a>
            </div>
            <div class="theGame">
                <a href="dispel/index.html">🃏消消乐</a>
            </div>
        </div>
    </div>
</body>
</html>
