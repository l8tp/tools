<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json"/>
  <title>地图笔记</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #f5f5f5;
    }

    @media (min-width: 768px) {
      body {
        flex-direction: row;
      }
    }

    #sidebar {
      width: 100%;
      max-height: 40vh;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      z-index: 1000;
      order: 2;
    }

    @media (min-width: 768px) {
      #sidebar {
        width: 350px;
        max-height: 100vh;
        order: 1;
        box-shadow: 2px 0 5px rgba(0,0,0,0.1);
      }
    }

    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 3px 10px;
      text-align: center;
    }

    .header h1 {
      font-size: 18px;
    }

    .toolbar {
      padding: 10px;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
      display: flex;
      gap: 8px;
    }

    .toolbar button {
      flex: 1;
      padding: 8px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
      background: #667eea;
      color: white;
    }

    .toolbar button:hover {
      background: #5568d3;
    }

    .toolbar button.secondary {
      background: #e0e0e0;
      color: #333;
    }

    .toolbar button.secondary:hover {
      background: #d0d0d0;
    }

    .search-box {
      padding: 10px;
      border-bottom: 1px solid #e0e0e0;
      background: #fafafa;
    }

    .search-box input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }

    .search-box input:focus {
      border-color: #667eea;
    }

    .marker-list {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .marker-item {
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .marker-item:hover {
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      border-color: #667eea;
    }

    .marker-item h3 {
      font-size: 14px;
      margin-bottom: 4px;
      color: #333;
    }

    .marker-item p {
      font-size: 12px;
      color: #666;
      margin-bottom: 6px;
    }

    .marker-item .coords {
      font-size: 11px;
      color: #999;
    }

    .marker-item .actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .marker-item .actions button {
      flex: 1;
      padding: 6px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-edit {
      background: #667eea;
      color: white;
    }

    .btn-edit:hover {
      background: #5568d3;
    }

    .btn-delete {
      background: #ff6b6b;
      color: white;
    }

    .btn-delete:hover {
      background: #ff5252;
    }

    #map {
      width: 100%;
      height: 60vh;
      order: 1;
    }

    @media (min-width: 768px) {
      #map {
        height: 100vh;
        order: 2;
      }
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 2000;
      justify-content: center;
      align-items: flex-end;
    }

    @media (min-width: 768px) {
      .modal {
        align-items: center;
      }
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: white;
      padding: 20px;
      border-radius: 16px 16px 0 0;
      width: 100%;
      max-width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    @media (min-width: 768px) {
      .modal-content {
        max-width: 500px;
        border-radius: 16px;
      }
    }

    .modal-content h2 {
      margin-bottom: 15px;
      color: #333;
      font-size: 18px;
    }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      color: #555;
      font-size: 13px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: #667eea;
    }

    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    .modal-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    .modal-buttons button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-save {
      background: #667eea;
      color: white;
    }

    .btn-save:hover {
      background: #5568d3;
    }

    .btn-cancel {
      background: #e0e0e0;
      color: #333;
    }

    .btn-cancel:hover {
      background: #d0d0d0;
    }

    .info-text {
      padding: 10px;
      text-align: center;
      color: #666;
      font-size: 12px;
      border-top: 1px solid #e0e0e0;
      background: #fafafa;
    }

    .empty-state {
      text-align: center;
      color: #999;
      padding: 30px 20px;
    }

    .empty-state svg {
      width: 60px;
      height: 60px;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #555;
    }

    #importInput {
      display: none;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <div class="header">
      <h1>📍 地图笔记-点击地图添加笔记</h1>
    </div>
    <div class="toolbar">
      <button onclick="exportNotes()">📤 导出</button>
      <button class="secondary" onclick="document.getElementById('importInput').click()">📥 导入</button>
      <input type="file" id="importInput" accept=".json" onchange="importNotes(event)">
    </div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="搜索笔记...">
    </div>
    <div class="marker-list" id="markerList">
      <div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
        <p>还没有笔记</p>
        <p>点击地图上的任意位置添加笔记</p>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <div class="modal" id="markerModal">
    <div class="modal-content">
      <h2 id="modalTitle">添加笔记</h2>
      <form id="markerForm">
        <div class="form-group">
          <label for="markerTitle">标题 *</label>
          <input type="text" id="markerTitle" required placeholder="输入标题">
        </div>
        <div class="form-group">
          <label for="markerCategory">分类</label>
          <input type="text" id="markerCategory" placeholder="例如：工作、旅行、收藏...">
        </div>
        <div class="form-group">
          <label for="markerNote">内容</label>
          <textarea id="markerNote" placeholder="添加详细内容..."></textarea>
        </div>
        <input type="hidden" id="markerId">
        <div class="modal-buttons">
          <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
          <button type="submit" class="btn-save">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map').setView([35.0, 105.0], 4);
    
    L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
      attribution: '&copy; 高德地图',
      minZoom: 2,
      maxZoom: 18,
      subdomains: ['1', '2', '3', '4']
    }).addTo(map);

    let markers = [];
    let markerLayer = L.layerGroup().addTo(map);
    let tempMarker = null;
    let editingId = null;
    let userLocationMarker = null;
    let userAccuracyCircle = null;

    function generateId() {
      return 'note_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
    }

    function showMyLocation() {
      if (!navigator.geolocation) {
        alert('您的浏览器不支持地理定位功能');
        return;
      }

      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          map.setView([lat, lng], 15);

          if (userLocationMarker) {
            map.removeLayer(userLocationMarker);
          }
          if (userAccuracyCircle) {
            map.removeLayer(userAccuracyCircle);
          }

          const userIcon = L.divIcon({
            html: `<div style="
              width: 20px;
              height: 20px;
              background: #4285f4;
              border: 3px solid white;
              border-radius: 50%;
              box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            "></div>`,
            className: 'user-location-marker',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
          });

          userLocationMarker = L.marker([lat, lng], { icon: userIcon })
            .bindPopup(`
              <div style="text-align: center;">
                <p style="margin: 0; font-weight: bold;">📍 我的位置</p>
                <p style="margin: 5px 0 0 0; font-size: 12px; color: #666;">
                  ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>
                  精度: ±${Math.round(accuracy)}米
                </p>
              </div>
            `)
            .addTo(map);

          userAccuracyCircle = L.circle([lat, lng], {
            radius: accuracy,
            color: '#4285f4',
            fillColor: '#4285f4',
            fillOpacity: 0.1,
            weight: 1
          }).addTo(map);
        },
        function(error) {
          let message = '获取位置失败';
          switch (error.code) {
            case error.PERMISSION_DENIED:
              message = '您拒绝了位置请求，请在浏览器设置中允许位置访问';
              break;
            case error.POSITION_UNAVAILABLE:
              message = '位置信息不可用';
              break;
            case error.TIMEOUT:
              message = '获取位置超时';
              break;
          }
          alert(message);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    function saveToStorage() {
      localStorage.setItem('mapNotes', JSON.stringify(markers));
    }

    function loadFromStorage() {
      const stored = localStorage.getItem('mapNotes');
      if (stored) {
        markers = JSON.parse(stored);
        markers.forEach(m => addMarkerToMap(m, false));
        updateMarkerList();
      }
    }

    function addMarkerToMap(data, save = true) {
      const icon = L.divIcon({
        html: `<svg width="30" height="40" viewBox="0 0 24 24" fill="#667eea" xmlns="http://www.w3.org/2000/svg">
                 <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
               </svg>`,
        className: 'custom-marker',
        iconSize: [30, 40],
        iconAnchor: [15, 40],
        popupAnchor: [0, -35]
      });

      const marker = L.marker([data.lat, data.lng], { icon })
        .bindPopup(`
          <div style="min-width: 200px;">
            <h3 style="margin: 0 0 5px 0; color: #333;">${data.title}</h3>
            ${data.category ? `<p style="margin: 5px 0; color: #667eea; font-size: 12px;">📁 ${data.category}</p>` : ''}
            <p style="margin: 5px 0; color: #666; font-size: 12px; white-space: pre-wrap;">${data.note || '无内容'}</p>
            <p style="margin: 8px 0 0 0; color: #999; font-size: 11px;">${data.lat.toFixed(6)}, ${data.lng.toFixed(6)}</p>
            <p style="margin: 3px 0 0 0; color: #999; font-size: 11px;">${new Date(data.createdAt).toLocaleString('zh-CN')}</p>
          </div>
        `)
        .addTo(markerLayer);

      marker.on('click', () => {
        highlightMarkerInList(data.id);
      });

      return marker;
    }

    function updateMarkerList(filteredMarkers = null) {
      const list = document.getElementById('markerList');
      const displayMarkers = filteredMarkers || markers;

      if (displayMarkers.length === 0) {
        list.innerHTML = `
          <div class="empty-state">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
            </svg>
            <p>${filteredMarkers ? '未找到匹配的笔记' : '还没有笔记'}</p>
            <p>${filteredMarkers ? '尝试其他搜索词' : '点击地图上的任意位置添加笔记'}</p>
          </div>
        `;
        return;
      }

      list.innerHTML = displayMarkers
        .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt))
        .map(m => `
          <div class="marker-item" data-id="${m.id}" onclick="locateMarker('${m.id}')">
            <h3>${m.title}</h3>
            ${m.category ? `<p>📁 ${m.category}</p>` : ''}
            <p>${m.note || '无内容'}</p>
            <div class="coords">${m.lat.toFixed(6)}, ${m.lng.toFixed(6)}</div>
            <div class="actions">
              <button class="btn-edit" onclick="event.stopPropagation(); editMarker('${m.id}')">编辑</button>
              <button class="btn-delete" onclick="event.stopPropagation(); deleteMarker('${m.id}')">删除</button>
            </div>
          </div>
        `).join('');
    }

    function locateMarker(id) {
      const marker = markers.find(m => m.id === id);
      if (marker) {
        map.setView([marker.lat, marker.lng], 15);
        highlightMarkerInList(id);
      }
    }

    function highlightMarkerInList(id) {
      const marker = markers.find(m => m.id === id);
      if (marker) {
        const layer = markerLayer.getLayers().find(l => 
          l.getLatLng().lat === marker.lat && l.getLatLng().lng === marker.lng
        );
        if (layer) {
          layer.openPopup();
        }
      }
      
      const item = document.querySelector(`.marker-item[data-id="${id}"]`);
      if (item) {
        document.querySelectorAll('.marker-item').forEach(i => i.style.borderColor = '#e0e0e0');
        item.style.borderColor = '#667eea';
        item.style.boxShadow = '0 2px 8px rgba(102, 126, 234, 0.3)';
      }
    }

    map.on('click', function(e) {
      openModal(e.latlng.lat, e.latlng.lng);
    });

    function openModal(lat = null, lng = null, id = null) {
      const modal = document.getElementById('markerModal');
      const title = document.getElementById('modalTitle');
      const titleInput = document.getElementById('markerTitle');
      const categoryInput = document.getElementById('markerCategory');
      const noteInput = document.getElementById('markerNote');
      const idInput = document.getElementById('markerId');

      if (id) {
        const marker = markers.find(m => m.id === id);
        if (marker) {
          title.textContent = '编辑笔记';
          titleInput.value = marker.title;
          categoryInput.value = marker.category || '';
          noteInput.value = marker.note || '';
          idInput.value = marker.id;
          editingId = marker.id;
        }
      } else {
        title.textContent = '添加笔记';
        titleInput.value = '';
        categoryInput.value = '';
        noteInput.value = '';
        idInput.value = '';
        editingId = null;

        if (lat && lng) {
          if (tempMarker) {
            map.removeLayer(tempMarker);
          }
          tempMarker = L.circleMarker([lat, lng], {
            radius: 8,
            color: '#667eea',
            fillColor: '#667eea',
            fillOpacity: 0.5
          }).addTo(map);
          idInput.value = `${lat},${lng}`;
        }
      }

      modal.classList.add('active');
      setTimeout(() => titleInput.focus(), 100);
    }

    function closeModal() {
      const modal = document.getElementById('markerModal');
      modal.classList.remove('active');
      if (tempMarker) {
        map.removeLayer(tempMarker);
        tempMarker = null;
      }
      editingId = null;
      document.getElementById('markerForm').reset();
    }

    document.getElementById('markerForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const title = document.getElementById('markerTitle').value.trim();
      const category = document.getElementById('markerCategory').value.trim();
      const note = document.getElementById('markerNote').value.trim();
      const idInput = document.getElementById('markerId').value;

      if (!title) {
        alert('请输入标题');
        return;
      }

      if (editingId) {
        const markerIndex = markers.findIndex(m => m.id === editingId);
        if (markerIndex !== -1) {
          markers[markerIndex].title = title;
          markers[markerIndex].category = category;
          markers[markerIndex].note = note;
          markers[markerIndex].updatedAt = new Date().toISOString();
          saveToStorage();
          
          markerLayer.clearLayers();
          markers.forEach(m => addMarkerToMap(m, false));
          updateMarkerList();
        }
      } else {
        const [lat, lng] = idInput.split(',').map(Number);
        const newMarker = {
          id: generateId(),
          lat,
          lng,
          title,
          category,
          note,
          createdAt: new Date().toISOString()
        };

        markers.push(newMarker);
        addMarkerToMap(newMarker, true);
        saveToStorage();
        updateMarkerList();
      }

      closeModal();
    });

    function editMarker(id) {
      openModal(null, null, id);
    }

    function deleteMarker(id) {
      if (confirm('确定要删除这个笔记吗？')) {
        markers = markers.filter(m => m.id !== id);
        markerLayer.clearLayers();
        markers.forEach(m => addMarkerToMap(m, false));
        saveToStorage();
        updateMarkerList();
      }
    }

    function exportNotes() {
      if (markers.length === 0) {
        alert('没有可导出的笔记');
        return;
      }

      const data = JSON.stringify(markers, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `map-notes-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importNotes(event) {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedMarkers = JSON.parse(e.target.result);
          
          if (!Array.isArray(importedMarkers)) {
            alert('导入文件格式错误');
            return;
          }

          let importedCount = 0;
          importedMarkers.forEach(m => {
            if (m.id && m.lat && m.lng && m.title) {
              if (!markers.find(existing => existing.id === m.id)) {
                markers.push(m);
                addMarkerToMap(m, false);
                importedCount++;
              }
            }
          });

          saveToStorage();
          updateMarkerList();
          alert(`成功导入 ${importedCount} 条笔记`);
        } catch (error) {
          alert('导入失败：文件格式不正确');
        }
      };
      reader.readAsText(file);
      event.target.value = '';
    }

    document.getElementById('searchInput').addEventListener('input', function(e) {
      const query = e.target.value.toLowerCase().trim();
      
      if (!query) {
        updateMarkerList();
        return;
      }

      const filtered = markers.filter(m => 
        m.title.toLowerCase().includes(query) || 
        (m.category && m.category.toLowerCase().includes(query)) || 
        (m.note && m.note.toLowerCase().includes(query))
      );

      updateMarkerList(filtered);
    });

    document.getElementById('markerModal').addEventListener('click', function(e) {
      if (e.target === this) {
        closeModal();
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        closeModal();
      }
    });

    loadFromStorage();

    if (navigator.geolocation) {
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lng = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          map.setView([lat, lng], 15);

          const userIcon = L.divIcon({
            html: `<div style="
              width: 20px;
              height: 20px;
              background: #4285f4;
              border: 3px solid white;
              border-radius: 50%;
              box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            "></div>`,
            className: 'user-location-marker',
            iconSize: [20, 20],
            iconAnchor: [10, 10]
          });

          userLocationMarker = L.marker([lat, lng], { icon: userIcon })
            .bindPopup(`
              <div style="text-align: center;">
                <p style="margin: 0; font-weight: bold;">📍 我的位置</p>
                <p style="margin: 5px 0 0 0; font-size: 12px; color: #666;">
                  ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>
                  精度: ±${Math.round(accuracy)}米
                </p>
              </div>
            `)
            .addTo(map);

          userAccuracyCircle = L.circle([lat, lng], {
            radius: accuracy,
            color: '#4285f4',
            fillColor: '#4285f4',
            fillOpacity: 0.1,
            weight: 1
          }).addTo(map);
        },
        function(error) {
          console.log('获取位置失败:', error.message);
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    window.addEventListener('load', async () => {
        if('serviceWorker' in navigator) {
            try{
                const registration = await navigator.serviceWorker.register('sw.js')
            }catch(err){
                console.log(err)
            }
        }else{
            console.log('浏览器不支持service worker注册失败')
        }
        if(!navigator.onLine){
            alert('本页面采用PWA技术，没有网络也能使用') 
            new Notification('提示', {body: '本页面采用PWA技术，没有网络也能使用'});
        }
        window.addEventListener('online', ()=>{
            new Notification('提示', {body: '网络已连接'});
        })
    });
  </script>
</body>
</html>
